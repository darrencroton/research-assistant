[output]
root = "output"
summaries_dir = "summaries"
daily_notes_dir = "daily-notes"
weekly_notes_dir = "weekly-notes"
pdfs_dir = "pdfs"

[state]
root = "state"
papers_dir = "papers"
runs_dir = "runs"

[logs]
root = "logs"
history_file = "history.log"
last_run_file = "last-run.log"

[templates]
daily_template = "user_preferences/templates/daily-note-template.md"
weekly_template = "user_preferences/templates/weekly-note-template.md"

[preferences]
file = "user_preferences/preferences.md"

[notes]
link_style = "wikilink"
weekly_note_file = "this-weeks-arxiv-papers.md"
rotation_day = "monday"
archive_name_pattern = "{date}-weekly-arxiv.md"

[arxiv]
max_papers = 3
page_size = 100
min_selection_score = 80
default_categories = ["astro-ph.CO", "astro-ph.GA", "astro-ph.HE"]

[llm]
mode = "cli"
provider = "claude"
model = ""
effort = ""
timeout_seconds = 900
max_output_tokens = 12288
temperature = 0.2
retry_attempts = 3
prompt_debug_file = "tmp/paper_summariser/prompt.txt"
download_timeout_seconds = 120
max_pdf_size_mb = 100
marker_timeout_seconds = 300
ollama_base_url = "http://localhost:11434"
